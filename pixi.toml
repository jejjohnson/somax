[project]
name = "somax"
version = "0.0.1"
description = "Simple Ocean Models in JAX"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.12"
numpy = "*"
scipy = "*"
xarray = "*"
netcdf4 = "*"
matplotlib = "*"
dvc = ">=3"
hydra-core = ">=1.3"

[pypi-dependencies]
somax = { path = ".", editable = true }
hydra-zen = ">=0.13"
omegaconf = ">=2.3"
orbax-checkpoint = "*"

[feature.dev.dependencies]
pytest = ">=8"
pytest-cov = ">=5"
pre-commit = ">=3.7"
ruff = ">=0.9"
jupytext = ">=1.16"

[feature.dev.pypi-dependencies]
ty = ">=0.0.1a6"

[feature.docs.dependencies]
nodejs = ">=18"

[feature.docs.pypi-dependencies]
mystmd = "*"

[feature.jupyterlab.dependencies]
jupyterlab = ">=4"
ipykernel = ">=6.29"
jupyterlab-git = "*"
jupyterlab-lsp = "*"
jupyter-lsp = "*"
python-lsp-server = "*"
jupyterlab-myst = "*"
ipywidgets = ">=8"
nbdime = "*"

[feature.jupyterlab.pypi-dependencies]
jupyterlab-code-formatter = "*"
jupyterlab-spellchecker = "*"

[environments]
default = { features = ["dev"], solve-group = "default" }
docs = { features = ["docs"], solve-group = "default" }
jupyterlab = { features = ["dev", "jupyterlab"], solve-group = "default" }

[tasks]
test = "pytest -v"
lint = "ruff check ."
format = "ruff format ."
typecheck = "ty check somax"
precommit = "pre-commit run --all-files"
# simulate-swm = "python scripts/swm.py"      # disabled until SWM model rewrite
# simulate-mqg = "python scripts/mqg_doublegyre.py"  # disabled until MQG model rewrite

[feature.docs.tasks]
docs-serve = "myst start"
docs-build = "myst build --html"

[feature.jupyterlab.tasks]
lab = "jupyter lab"
