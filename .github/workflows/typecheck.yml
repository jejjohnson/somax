name: Type Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Install typecheck dependencies
        run: uv sync --only-group typecheck
      - name: Run ty check
        run: uv run --only-group typecheck ty check somax
