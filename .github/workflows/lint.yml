name: Lint & Format

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
      - name: Install lint dependencies
        run: uv sync --only-group lint
      - name: Run ruff check
        run: uv run --only-group lint ruff check .
      - name: Run ruff format check
        run: uv run --only-group lint ruff format --check .
