# DVC pipeline for somax reference simulations.
#
# Stage graph:
#
#   build-configs                    (materializes YAML from configs/_authoring/*.py)
#         │
#         ├──→ simulate-swm-jet      (multilayer SWM, 30-day baroclinic instability)
#         ├──→ simulate-bt-qg        (single-layer wind-driven double gyre)
#         └──→ spinup-bc-qg          (3-year spinup of multilayer baroclinic QG)
#                  │
#                  └──→ simulate-bc-qg  (1-year production restart from spinup)
#
# Edit configs/_authoring/*.py to change parameters; do NOT hand-edit
# configs/simulation/*.yaml — they are regenerated by build-configs.
#
# Run `dvc repro` (or `pixi run sim`) to execute the whole pipeline.

stages:

  build-configs:
    desc: Materialize YAML configs from configs/_authoring Python modules.
    cmd: python scripts/build_configs.py
    deps:
      - scripts/build_configs.py
      - configs/_authoring
    outs:
      - configs/simulation/swm_jet.yaml:
          cache: false
      - configs/simulation/doublegyre_bt_qg.yaml:
          cache: false
      - configs/simulation/spinup_bc_qg.yaml:
          cache: false
      - configs/simulation/doublegyre_bc_qg.yaml:
          cache: false

  simulate-swm-jet:
    desc: 2-layer baroclinic-instability SWM (30-day, 64²).
    cmd: >-
      somax-sim run
      --config configs/simulation/swm_jet.yaml
      --output-dir data/simulations/swm_jet
    deps:
      - configs/simulation/swm_jet.yaml
      - somax/_src
    outs:
      - data/simulations/swm_jet/snapshots.zarr
      - data/simulations/swm_jet/final_state.zarr
    metrics:
      - data/simulations/swm_jet/metrics.json:
          cache: false

  simulate-bt-qg:
    desc: Barotropic QG wind-driven double-gyre (1 yr, 64²).
    cmd: >-
      somax-sim run
      --config configs/simulation/doublegyre_bt_qg.yaml
      --output-dir data/simulations/doublegyre_bt_qg
    deps:
      - configs/simulation/doublegyre_bt_qg.yaml
      - somax/_src
    outs:
      - data/simulations/doublegyre_bt_qg/snapshots.zarr
      - data/simulations/doublegyre_bt_qg/final_state.zarr
    metrics:
      - data/simulations/doublegyre_bt_qg/metrics.json:
          cache: false

  spinup-bc-qg:
    desc: 3-year spinup of the 3-layer baroclinic QG double-gyre (128²).
    cmd: >-
      somax-sim spinup
      --config configs/simulation/spinup_bc_qg.yaml
      --output-dir data/spinup/bc_qg
    deps:
      - configs/simulation/spinup_bc_qg.yaml
      - somax/_src
    outs:
      - data/spinup/bc_qg/final_state.zarr

  simulate-bc-qg:
    desc: 1-year production run of the 3-layer baroclinic QG double-gyre (128²), starting from the spinup.
    cmd: >-
      somax-sim restart
      --config configs/simulation/doublegyre_bc_qg.yaml
      --from data/spinup/bc_qg/final_state.zarr
      --output-dir data/simulations/doublegyre_bc_qg
    deps:
      - configs/simulation/doublegyre_bc_qg.yaml
      - data/spinup/bc_qg/final_state.zarr
      - somax/_src
    outs:
      - data/simulations/doublegyre_bc_qg/snapshots.zarr
      - data/simulations/doublegyre_bc_qg/final_state.zarr
    metrics:
      - data/simulations/doublegyre_bc_qg/metrics.json:
          cache: false
